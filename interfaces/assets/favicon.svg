<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@900&amp;display=swap');
      .txt {
        font-family: 'Poppins', sans-serif;
        font-weight: 900;
        fill: #e63946;
      }
      .bg {
        fill: #1c1b1b;
      }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background circle/square with shadow for favicon legibility -->
  <rect x="5" y="5" width="90" height="90" rx="24" ry="24" class="bg" filter="url(#shadow)"/>
  <!-- Bold text optimized for 16x16 / 32x32 viewports -->
  <text x="50" y="68" font-size="48" text-anchor="middle" class="txt">APP</text>
</svg>
