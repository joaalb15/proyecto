<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@900&amp;display=swap');
      .txt {
        font-family: 'Poppins', sans-serif;
        font-weight: 900;
        fill: #e63946;
      }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="5" stdDeviation="4" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <!-- Card style container with premium shadow -->
  <rect x="8" y="8" width="84" height="84" rx="22" ry="22" fill="#1c1b1b" stroke="#e63946" stroke-width="2.5" filter="url(#shadow)"/>
  <!-- APP text centered -->
  <text x="50" y="65" font-size="40" text-anchor="middle" class="txt">APP</text>
</svg>
